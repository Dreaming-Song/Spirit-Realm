name: CI 自动测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          cd server
          pip install -r requirements.txt
          pip install pytest pytest-asyncio websockets

      - name: 启动服务端并测试
        run: |
          cd server
          python main.py &
          sleep 2
          cd ..
          python -m pytest tests/test_server.py -v --tb=short

      - name: 停止服务端
        run: pkill -f "python main.py" || true
